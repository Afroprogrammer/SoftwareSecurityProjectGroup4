name: SDLC Security Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scans:
    runs-on: ubuntu-latest
    name: SAST and Dependency Analysis

    steps:
    # 1. Pull down the repository code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Boot a Python Environment (Required for Bandit to run)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # 3. Install Bandit and Application Dependencies
    - name: Install Security Tools
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install bandit

    # 4. Perform Static Application Security Testing (SAST)
    - name: Run Bandit Code Scanner
      run: |
        # Recursively analyzes backend logic for hardcoded secrets or logical vulnerabilities
        # -ll: Only report Medium/High severity
        # -ii: Only report Medium/High confidence
        bandit -r backend/app/ -ll -ii

    # 5. Perform Software Composition Analysis (SCA) via Official PyUp Action
    - name: Run Safety CLI to check for vulnerabilities
      uses: pyupio/safety-action@v1
      with:
        api-key: ${{ secrets.SAFETY_API_KEY }}
