services:
  db:
    image: postgres:15
    container_name: secure_software_db
    environment:
      POSTGRES_USER: secure_user
      POSTGRES_PASSWORD: secure_password_123!
      POSTGRES_DB: secure_app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
