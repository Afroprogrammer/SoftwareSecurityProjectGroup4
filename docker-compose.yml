version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: secure_postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: secure_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres_init.sql:/docker-entrypoint-initdb.d/postgres_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d secure_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: secure_fastapi_backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://app_user:RestrictedAppPass123!@db:5432/secure_app
      - SECRET_KEY=b9c6f22e838eaaebd0a149cbedb6a4b13bd1cedec3f95e5b61b24137df7edec7
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - FRONTEND_URL=http://localhost:5173
      - DEFAULT_ADMIN_EMAIL=admin@securenet.local
      - DEFAULT_ADMIN_PASSWORD=SuperSecurePassword123!
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: secure_react_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
