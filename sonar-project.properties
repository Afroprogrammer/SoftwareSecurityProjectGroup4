# sonar-project.properties
# ─────────────────────────────────────────────────────────────────────────────
# SonarCloud configuration for Group 4 Secure SDLC Project
#
# Setup Instructions:
#   1. Go to https://sonarcloud.io and sign in with your GitHub account
#   2. Import your repository
#   3. Update sonar.projectKey and sonar.organization if SonarCloud gives you different IDs
#   4. Generate a token on SonarCloud and add it to your GitHub Repo Secrets as SONAR_TOKEN
# ─────────────────────────────────────────────────────────────────────────────

sonar.projectKey=group4-loremipsum-secure
sonar.organization=group4-academic
sonar.projectName=LoremIpsum Secure

# ─── SOURCE PATHS ────────────────────────────────────────────────────────────
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests,frontend/src

# ─── EXCLUSIONS ──────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/__pycache__/**,\
  **/venv/**,\
  **/.venv/**,\
  **/migrations/**,\
  **/dist/**,\
  **/build/**,\
  **/*.min.js,\
  **/coverage/**

sonar.test.inclusions=\
  backend/tests/**,\
  frontend/src/**/*.test.*,\
  frontend/src/**/*.spec.*

# ─── LANGUAGES ───────────────────────────────────────────────────────────────
sonar.python.version=3.10
sonar.javascript.node.maxspace=4096

# ─── COVERAGE REPORTS ────────────────────────────────────────────────────────
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# ─── ENCODING ────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
